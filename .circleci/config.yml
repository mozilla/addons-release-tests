version: 2.1
jobs:
  install_tests_stage:
    docker:
      - image: cimg/python:3.14-browsers
    steps:
      - checkout
      - run:
          name: Install Firefox Nightly via Mozilla APT
          command: |
            wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | sudo gpg --dearmor -o /etc/apt/keyrings/packages.mozilla.org.gpg
            echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.gpg] https://packages.mozilla.org/apt mozilla main" | sudo tee /etc/apt/sources.list.d/mozilla.list
            sudo apt-get update -qq -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/mozilla.list -o Dir::Etc::sourceparts="-"
            sudo apt-get install -y -qq firefox-nightly
            firefox-nightly --version
      - run:
          name: Install requirements
          command: pip install -r ./requirements.txt
      - run:
          name: Install tests (stage)
          environment:
            DISPLAY: :99
          command: python -m pytest tests/frontend/test_install.py --driver Firefox --variables stage.json --html=install-stage-test-results.html --self-contained-html -v
          no_output_timeout: 10m
      - store_artifacts:
          path: install-stage-test-results.html

  install_tests_dev:
    docker:
      - image: cimg/python:3.14-browsers
    steps:
      - checkout
      - run:
          name: Install Firefox Nightly via Mozilla APT
          command: |
            wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | sudo gpg --dearmor -o /etc/apt/keyrings/packages.mozilla.org.gpg
            echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.gpg] https://packages.mozilla.org/apt mozilla main" | sudo tee /etc/apt/sources.list.d/mozilla.list
            sudo apt-get update -qq -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/mozilla.list -o Dir::Etc::sourceparts="-"
            sudo apt-get install -y -qq firefox-nightly
            firefox-nightly --version
      - run:
          name: Install requirements
          command: pip install -r ./requirements.txt
      - run:
          name: Install tests (dev)
          environment:
            DISPLAY: :99
          command: python -m pytest tests/frontend/test_install.py --driver Firefox --variables dev.json --html=install-dev-test-results.html --self-contained-html -v
          no_output_timeout: 10m
      - store_artifacts:
          path: install-dev-test-results.html

  install_tests_prod:
    docker:
      - image: cimg/python:3.14-browsers
    steps:
      - checkout
      - run:
          name: Install Firefox via Mozilla APT
          command: |
            wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | sudo gpg --dearmor -o /etc/apt/keyrings/packages.mozilla.org.gpg
            echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.gpg] https://packages.mozilla.org/apt mozilla main" | sudo tee /etc/apt/sources.list.d/mozilla.list
            sudo apt-get update -qq -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/mozilla.list -o Dir::Etc::sourceparts="-"
            sudo apt-get install -y -qq firefox
            firefox --version
      - run:
          name: Install requirements
          command: pip install -r ./requirements.txt
      - run:
          name: Install tests (prod)
          environment:
            DISPLAY: :99
          command: python -m pytest tests/frontend/test_install.py --driver Firefox --variables prod.json --html=install-prod-test-results.html --self-contained-html -v
          no_output_timeout: 10m
      - store_artifacts:
          path: install-prod-test-results.html

workflows:
  install_tests:
    jobs:
      - install_tests_stage
      - install_tests_dev
      - install_tests_prod
